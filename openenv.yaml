spec_version: 1
name: devops-incident-env
description: "DevOps Incident Response RL Environment - Train AI agents to detect, diagnose, and resolve distributed system failures across 6 microservices"
type: environment
runtime:
  language: python
  version: "3.11"
app:
  module: devops_incident_env.server.app
  factory: app
port: 8000
tasks:
  - id: easy_task
    name: "Easy: Single Service Crash"
    description: "Diagnose and fix a single service crash. The api_gateway is down - find it and restart it."
    difficulty: easy
    max_steps: 10
    reward_range: [0.0, 1.0]
  - id: medium_task
    name: "Medium: Memory Leak Detection"
    description: "A memory leak is causing repeated OOM kills. Identify the service and apply the correct memory fix."
    difficulty: medium
    max_steps: 15
    reward_range: [0.0, 1.0]
  - id: hard_task
    name: "Hard: Cascading Microservice Failure"
    description: "The database disk is full, causing a cascade through payment_service, order_service, and api_gateway. Trace the root cause and resolve it."
    difficulty: hard
    max_steps: 20
    reward_range: [0.0, 1.0]