spec_version: 1
name: devops-incident-response
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: >
  A production-style DevOps incident response environment where agents investigate
  alerts, inspect logs, query metrics, diagnose root causes, and apply fixes across
  a six-service microservice architecture.
tasks:
  - id: easy_task
    name: Single Service Crash
    description: Diagnose and restart a crashed api_gateway service.
    difficulty: easy
    max_steps: 10
    reward_range: [0.0, 1.0]
  - id: medium_task
    name: Memory Leak with Cascading Symptoms
    description: Track downstream latency back to an order_service memory leak.
    difficulty: medium
    max_steps: 15
    reward_range: [0.0, 1.0]
  - id: hard_task
    name: Cascading Failure Chain
    description: Trace a multi-service outage back to a database disk exhaustion event with misleading symptoms.
    difficulty: hard
    max_steps: 20
    reward_range: [0.0, 1.0]
  - id: expert_task
    name: Multi-Root Cascading Failure
    description: Diagnose and resolve multiple simultaneous root causes across different service tiers with red herrings.
    difficulty: expert
    max_steps: 30
    reward_range: [0.0, 1.0]
metadata:
  version: "1.0.0"
  tags:
    - openenv
    - devops
    - incident-response
